# Minimal AeroSpace config, shaped after the core Hyprland workflow.
# Docs: https://nikitabobko.github.io/AeroSpace/guide

start-at-login = true

after-login-command = []
after-startup-command = []

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30

default-root-container-layout = 'tiles'
default-root-container-orientation = 'vertical'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = false

[gaps]
inner.horizontal = 4
inner.vertical = 4
outer.left = 0
outer.bottom = 0
outer.top = 0
outer.right = 0

# Use cmd as the macOS equivalent of Hyprland's SUPER.
# macOS screenshot shortcuts need to be disabled separately for cmd-shift-3/4/5.
[mode.main.binding]

# Apps
cmd-enter = '''exec-and-forget osascript -e 'tell application "Ghostty" to activate' -e 'delay 0.1' -e 'tell application "System Events" to tell process "Ghostty" to click menu item "New Window" of menu "File" of menu bar 1''''
cmd-w = 'exec-and-forget open -a Firefox'
cmd-n = 'exec-and-forget open -a Finder'
cmd-ctrl-v = 'exec-and-forget /Users/ori/Developer/dotfiles/.local/bin/connect-vpn'

# Window actions
cmd-q = 'close'
cmd-shift-p = 'enable toggle'
cmd-shift-space = 'layout floating tiling'
cmd-f = 'fullscreen'
cmd-slash = 'layout tiles horizontal vertical'
cmd-comma = 'layout accordion horizontal vertical'

# Focus, vim-style and arrows
cmd-h = ['focus left', 'move-mouse window-lazy-center']
cmd-j = ['focus down', 'move-mouse window-lazy-center']
cmd-k = ['focus up', 'move-mouse window-lazy-center']
cmd-l = ['focus right', 'move-mouse window-lazy-center']
cmd-left = ['focus left', 'move-mouse window-lazy-center']
cmd-down = ['focus down', 'move-mouse window-lazy-center']
cmd-up = ['focus up', 'move-mouse window-lazy-center']
cmd-right = ['focus right', 'move-mouse window-lazy-center']

# Move windows, vim-style and arrows
cmd-shift-h = 'move left'
cmd-shift-j = 'move down'
cmd-shift-k = 'move up'
cmd-shift-l = 'move right'
cmd-shift-left = 'move left'
cmd-shift-down = 'move down'
cmd-shift-up = 'move up'
cmd-shift-right = 'move right'

# Resize
cmd-minus = 'resize smart -50'
cmd-equal = 'resize smart +50'

# Workspaces
cmd-1 = 'workspace 1'
cmd-2 = 'workspace 2'
cmd-3 = 'workspace 3'
cmd-4 = 'workspace 4'
cmd-5 = 'workspace 5'
cmd-6 = 'workspace 6'
cmd-7 = 'workspace 7'
cmd-8 = 'workspace 8'
cmd-9 = 'workspace 9'
cmd-0 = 'workspace 10'

# Move active window to workspace
cmd-shift-1 = 'move-node-to-workspace 1'
cmd-shift-2 = 'move-node-to-workspace 2'
cmd-shift-3 = 'move-node-to-workspace 3'
cmd-shift-4 = 'move-node-to-workspace 4'
cmd-shift-5 = 'move-node-to-workspace 5'
cmd-shift-6 = 'move-node-to-workspace 6'
cmd-shift-7 = 'move-node-to-workspace 7'
cmd-shift-8 = 'move-node-to-workspace 8'
cmd-shift-9 = 'move-node-to-workspace 9'
cmd-shift-0 = 'move-node-to-workspace 10'

# Keep a tiny service mode for cleanup/reload operations.
cmd-shift-semicolon = 'mode service'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

cmd-shift-h = ['join-with left', 'mode main']
cmd-shift-j = ['join-with down', 'mode main']
cmd-shift-k = ['join-with up', 'mode main']
cmd-shift-l = ['join-with right', 'mode main']


[workspace-to-monitor-force-assignment]
1 = 'main'
2 = 'main'
3 = 'main'
4 = 'main'
5 = 'main'
6 = ['secondary', 'main']
7 = ['secondary', 'main']
8 = ['secondary', 'main']
9 = ['secondary', 'main']
