# Monitor configuration
# Use `hyprctl monitors` if you ever need to update a connector name or description.

# Safe fallback for anything not matched below.
monitor = , preferred, auto, 1

# External monitor layouts. Place externals to the left of the laptop panel.
monitor = desc:HAS HGM-242A 0x1E3F5939, 1920x1080, -1920x0, 1
monitor = desc:Dell Inc. DELL E2016H 0HXWJ86Q1HEI, 1600x900, -1600x0, 1
monitor = desc:Dell Inc. DELL E2016H 0HXWJ86P180U, 1600x900, -1600x0, 1
monitor = desc:LG Electronics LG ULTRAGEAR 508NTUWGP582, 1920x1080@179, -1920x0, 1

# Laptop panel on the right at the origin.
monitor = eDP-1, 1920x1080@144, 0x0, 1

# Keep your main workspaces on the external display.
workspace = 1, monitor:DP-1
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
